<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" role="img" aria-labelledby="title">
  <title id="title">Tazamall</title>
  <!-- Shopping bag icon -->
  <g transform="translate(10, 10)">
    <!-- Bag body -->
    <rect x="8" y="15" width="40" height="45" rx="4" fill="#66cc66" stroke="#33cc33" stroke-width="2"/>
    <!-- Bag handles -->
    <path d="M 18 15 Q 18 5 28 5 Q 38 5 38 15" stroke="#33cc33" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Accent -->
    <circle cx="28" cy="32" r="6" fill="#ffffff" opacity="0.6"/>
  </g>

  <!-- Text: Tazamall -->
  <text x="70" y="55" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#1b5e20">
    Tazamall
  </text>
</svg>
